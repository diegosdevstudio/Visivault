<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VisiVault — DiegosDevStudio</title>
  <style>
    /* ─── FORCE MIDNIGHT PROTECTION ─── */
    :root {
      --bg: #121826;
      --cyan: #22D3EE;
      --blue: #2563EB;
      --text: #F8FAFC;
      --muted: #94A3B8;
      --glass-bg: rgba(255,255,255,0.04);
      --glass-border: rgba(37,99,235,0.35);
      --radius: 14px;
    }

    /* THE MOST IMPORTANT PART: Ensure the background is dark immediately */
    html, body {
      background-color: #121826 !important; 
      color: #F8FAFC;
      margin: 0; padding: 0;
      font-family: sans-serif; /* Fallback font */
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 10%, rgba(34,211,238,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 90% 90%, rgba(37,99,235,0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px; background: rgba(18,24,38,0.8);
      backdrop-filter: blur(18px); border-bottom: 1px solid var(--glass-border);
    }

    .logo-text { font-weight: 800; font-size: 1.2rem; color: var(--cyan); }
    
    main { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 40px 20px; }

    .card {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: var(--radius); padding: 25px; margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }

    .upload-zone {
      border: 2px dashed var(--glass-border); border-radius: var(--radius);
      padding: 40px; text-align: center; cursor: pointer; background: rgba(37,99,235,0.05);
    }

    .btn-primary {
      background: linear-gradient(90deg, var(--cyan), var(--blue));
      color: white; border: none; padding: 15px; border-radius: 10px;
      font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px;
    }

    .tag-btn {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      color: var(--muted); padding: 8px 15px; border-radius: 20px;
      cursor: pointer; margin: 5px; font-size: 0.8rem;
    }
    .tag-btn.active { background: var(--cyan); color: #000; border-color: var(--cyan); }

    .treatment-box {
      background: rgba(0,0,0,0.3); padding: 20px; border-radius: 10px;
      border-left: 4px solid var(--cyan); color: var(--text); line-height: 1.6;
    }
  </style>
</head>
<body>

<nav>
  <div class="logo-text">VisiVault</div>
  <div style="font-size: 0.7rem; color: var(--muted);">DIEGOSDEV STUDIO</div>
</nav>

<main>
  <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Director's <span>Treatment</span> Engine</h1>
  <p style="color: var(--muted); margin-bottom: 30px;">Generate high-end technical visual storytelling prompts.</p>

  <div class="card">
    <label style="font-size: 0.8rem; color: var(--cyan);">GEMINI API KEY</label>
    <input type="password" id="api-key" placeholder="Paste Key Here..." style="width:100%; background:black; color:white; border:1px solid var(--glass-border); padding:10px; margin-top:10px; border-radius:5px;">
  </div>

  <div class="card">
    <div class="upload-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*" style="display:none;">
      <p><strong>Click to Upload Frame</strong></p>
    </div>
    <div id="preview-wrap" style="display:none; margin-top:15px;"><img id="preview-img" style="width:100%; border-radius:10px;"></div>
  </div>

  <div class="card">
    <p style="font-size: 0.8rem; color: var(--cyan); margin-bottom: 10px;">ENHANCERS</p>
    <div id="tags">
      <button class="tag-btn" data-val="Arri Alexa 65">Arri Alexa</button>
      <button class="tag-btn" data-val="85mm Prime Lens">85mm Prime</button>
      <button class="tag-btn" data-val="Volumetric Lighting">Volumetric Light</button>
      <button class="tag-btn" data-val="Kodak Portra 400">Portra 400</button>
    </div>
  </div>

  <button class="btn-primary" id="go-btn">FORGE TREATMENT</button>

  <div id="output" style="display:none; margin-top:30px;">
    <div class="card">
      <div class="treatment-box" id="result-text"></div>
    </div>
  </div>
</main>

<script>
  const fileIn = document.getElementById('file-input');
  const dropZone = document.getElementById('drop-zone');
  const goBtn = document.getElementById('go-btn');
  let b64 = null, mime = null;

  dropZone.onclick = () => fileIn.click();
  fileIn.onchange = (e) => {
    const file = e.target.files[0];
    mime = file.type;
    const reader = new FileReader();
    reader.onload = (re) => {
      b64 = re.target.result.split(',')[1];
      document.getElementById('preview-img').src = re.target.result;
      document.getElementById('preview-wrap').style.display = 'block';
    };
    reader.readAsDataURL(file);
  };

  document.querySelectorAll('.tag-btn').forEach(b => {
    b.onclick = () => b.classList.toggle('active');
  });

  goBtn.onclick = async () => {
    const key = document.getElementById('api-key').value;
    if(!key || !b64) return alert("Missing Key or Image");
    
    const out = document.getElementById('result-text');
    document.getElementById('output').style.display = 'block';
    out.textContent = "Analyzing...";

    const activeTags = [...document.querySelectorAll('.tag-btn.active')].map(b => b.dataset.val).join(', ');
    const prompt = `Act as a Creative Director. Analyze the image and write a 100-word Director's Treatment using these styles: ${activeTags}`;

    try {
      const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
        method: 'POST',
        body: JSON.stringify({ contents: [{ parts: [{text: prompt}, {inline_data: {mime_type: mime, data: b64}}] }] })
      });
      const d = await r.json();
      out.textContent = d.candidates[0].content.parts[0].text;
    } catch(err) { out.textContent = "Error: Check Key or Connection."; }
  };
</script>
</body>
</html>
