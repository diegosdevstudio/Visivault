<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VisiVault — DiegosDevStudio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div style="padding-left: 10px;">
    <div class="logo-text">VisiVault</div>
    <div class="logo-sub">DiegosDevStudio</div>
  </div>
  <div style="flex: 1;"></div>
  <div style="font-size: 0.65rem; color: var(--cyan); border: 1px solid rgba(34,211,238,0.3); padding: 3px 10px; border-radius: 20px;">gemini-2.0-flash</div>
</nav>

<main>
  <h1>Director's <span>Treatment</span> Engine</h1>
  <p style="color:var(--muted); margin-bottom:30px;">Generate high-end technical visual storytelling prompts from any image.</p>

  <div class="card">
    <label style="font-size:0.7rem; color:var(--muted); display:block; margin-bottom:8px;">GEMINI API KEY</label>
    <input type="password" id="api-key-input" placeholder="AIza..." style="width:100%; padding:12px; background:rgba(0,0,0,0.3); border:1px solid var(--glass-border); color:white; border-radius:8px;">
  </div>

  <div class="card">
    <div class="upload-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*" style="position:absolute; inset:0; opacity:0; cursor:pointer;">
      <p><strong>Drop a frame</strong> or click to browse</p>
    </div>
    <div id="preview-wrap" style="display:none; margin-top:20px; border:1px solid var(--glass-border); border-radius:14px; overflow:hidden;">
        <img id="preview-img" src="" style="width:100%; display:block;">
    </div>
  </div>

  <div class="card">
    <p style="font-size:0.7rem; color:var(--cyan); margin-bottom:15px;">TECHNICAL ENHANCERS</p>
    <div class="enhancer-grid">
      <button class="tag-btn" data-tag="Arri Alexa 65, cinematic gold standard">Arri Alexa</button>
      <button class="tag-btn" data-tag="f/1.2 Master Prime lens, razor-sharp bokeh">f/1.2 Prime</button>
      <button class="tag-btn" data-tag="Volumetric Rim Light, god rays">Volumetric Light</button>
      <button class="tag-btn" data-tag="Kodak Portra 400 film stock">Portra 400</button>
    </div>
  </div>

  <button class="btn-primary" id="analyze-btn" disabled>Forge Treatment</button>

  <div id="output-section" style="display:none; margin-top:30px;">
    <div class="card">
        <div class="treatment-box" id="treatment-output"></div>
        <button class="btn-primary" style="margin-top:15px; background:var(--glass-bg); border:1px solid var(--glass-border);" onclick="copyText()">Copy Treatment</button>
    </div>
  </div>
</main>

<script>
  const fileInput = document.getElementById('file-input');
  const analyzeBtn = document.getElementById('analyze-btn');
  const previewImg = document.getElementById('preview-img');
  const previewWrap = document.getElementById('preview-wrap');
  const outputSection = document.getElementById('output-section');
  const treatmentOut = document.getElementById('treatment-output');

  let currentB64 = null;
  let currentMime = null;
  const activeTags = new Set();

  // Tag Toggling
  document.querySelectorAll('.tag-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
      if(btn.classList.contains('active')) activeTags.add(btn.dataset.tag);
      else activeTags.delete(btn.dataset.tag);
    });
  });

  // Handle File
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (file) {
      currentMime = file.type;
      const reader = new FileReader();
      reader.onload = (e) => {
        currentB64 = e.target.result.split(',')[1];
        previewImg.src = e.target.result;
        previewWrap.style.display = 'block';
        analyzeBtn.disabled = false;
      };
      reader.readAsDataURL(file);
    }
  });

  // Analyze Function
  async function generate() {
    const key = document.getElementById('api-key-input').value;
    if(!key) return alert("API Key Required");

    treatmentOut.textContent = "Analyzing visual data...";
    outputSection.style.display = 'block';

    const prompt = `Analyze this image as a Creative Director. Write a 100-word cinematic Director's Treatment. Use these modifiers: ${Array.from(activeTags).join(', ')}`;

    try {
      const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          contents: [{ parts: [{text: prompt}, {inline_data: {mime_type: currentMime, data: currentB64}}] }]
        })
      });
      const data = await resp.json();
      treatmentOut.textContent = data.candidates[0].content.parts[0].text;
    } catch(e) {
      treatmentOut.textContent = "Error: Check your API Key.";
    }
  }

  analyzeBtn.addEventListener('click', generate);
  function copyText() {
    navigator.clipboard.writeText(treatmentOut.textContent);
    alert("Copied!");
  }
</script>
</body>
</html>
